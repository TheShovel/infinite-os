<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Infinite OS</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- Boot Screen -->
        <div id="boot">
            <div id="boot-stars"></div>
            <div id="boot-box">
                <div id="boot-logo">✦</div>
                <div id="boot-name">Infinite OS</div>
                <div id="boot-spinner"><div class="spinner"></div></div>
                <div id="boot-status">Initializing...</div>
                <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
            </div>
        </div>

        <!-- Desktop -->
        <div id="desktop"><div id="desktop-icons"></div></div>

        <!-- Windows -->
        <div id="windows-container"></div>

        <!-- Start Menu (Launcher) -->
        <div id="launcher" class="hide">
            <div id="launcher-bg" onclick="closeLauncher()"></div>
            <div id="launcher-box">
                <div id="launcher-hd">
                    <span style="font-size: 24px">✦</span>
                    <span style="font-size: 14px; opacity: 0.5"
                        >Infinite OS</span
                    >
                </div>
                <div id="launcher-srch">
                    <input
                        id="launcher-inp"
                        type="text"
                        placeholder="Describe any app to generate..."
                        autofocus
                        onkeydown="onLauncherKey(event)"
                    />
                    <button id="launcher-go" onclick="searchApp()">
                        Generate ➤
                    </button>
                </div>
                <div id="launcher-st"></div>
                <div id="sm-body">
                    <div id="sm-footer">
                        <button
                            class="sm-act"
                            onclick="
                                closeLauncher();
                                openSettings();
                            "
                            title="Customize Infinite OS"
                        >
                            <span>⚙️</span><span>Settings</span>
                        </button>
                        <button
                            class="sm-act"
                            onclick="
                                closeLauncher();
                                showWelcome();
                            "
                            title="Welcome"
                        >
                            <span>✦</span><span>Welcome</span>
                        </button>
                        <button
                            class="sm-act"
                            onclick="
                                closeLauncher();
                                showAbout();
                            "
                            title="About"
                        >
                            <span>ℹ️</span><span>About</span>
                        </button>
                        <button
                            class="sm-act"
                            onclick="restartOS()"
                            title="Restart OS"
                        >
                            <span>🔄</span><span>Reload</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Notifications -->
        <div id="notif-box"></div>

        <!-- Desktop Context Menu -->
        <div id="ctx" class="hide"></div>

        <!-- Taskbar -->
        <div id="taskbar">
            <button
                id="tb-start"
                onclick="toggleLauncher()"
                title="Search / Launch apps"
            >
                <span>✦</span>
            </button>
            <div id="tb-apps"></div>
            <div id="tb-right">
                <span id="tb-clock">--:--</span>
            </div>
        </div>

        <script src="templates.js"></script>
        <script src="app.js"></script>
    </body>
</html>
